<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volleyball Referee View</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="viewer-mode referee-page">
    <div id="loginOverlay" class="login-overlay" style="display:flex;">
        <div class="login-box">
            <h2>🏐 Enter Referee View</h2>
            <p>Enter scorer password to access referee summary.</p>
            <input type="password" id="passwordInput" placeholder="Scorer password" />
            <div id="loginError" class="login-error">Incorrect password. Try again.</div>
            <div class="login-buttons">
                <a class="btn-viewer" href="index.html">Back</a>
                <button class="btn-scorer" onclick="attemptRefereeLogin()">Enter Referee View</button>
            </div>
        </div>
    </div>

    <div class="container referee-container">
        <div class="referee-header-row">
            <h1>Referee View</h1>
            <div class="referee-header-actions">
                <div class="theme-selector-row referee-theme-row">
                    <span class="theme-selector-label">Theme</span>
                    <select id="themeSelector" class="theme-selector" aria-label="Display theme" onchange="setDisplayTheme(this.value)">
                        <option value="night">Dark</option>
                        <option value="day">Light</option>
                    </select>
                </div>
                <button class="court-swap-btn" onclick="swapRefereeSides()">⇄ Swap Sides</button>
                <a href="index.html" class="header-pill-link">Scorer View</a>
            </div>
        </div>

        <div id="refereeEmpty" class="card">No active match selected.</div>
        <div id="refereeView" class="card" style="display:none;"></div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/mode-manager.js"></script>
    <script src="js/referee.js"></script>
</body>

</html>
