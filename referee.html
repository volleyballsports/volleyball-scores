<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volleyball Current Match</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="viewer-mode referee-page">
    
    <div class="container referee-container">
        <div class="referee-header-row">
            <h1>Current Match</h1>
            <div class="referee-header-actions">
                <div class="theme-selector-row referee-theme-row">
                    <span class="theme-selector-label">Theme</span>
                    <select id="themeSelector" class="theme-selector" aria-label="Display theme" onchange="setDisplayTheme(this.value)">
                        <option value="night">Dark</option>
                        <option value="day">Light</option>
                    </select>
                </div>
                <button class="court-swap-btn" onclick="swapRefereeSides()">⇄ Swap Sides</button>
            </div>
        </div>

        <div id="refereeEmpty" class="card">No active match selected.</div>
        <div id="refereeView" class="card" style="display:none;"></div>
    </div>

    <div class="view-pills-bottom">
        <a href="index.html" class="view-pill">Scorer View</a>
        <span class="view-pill current" aria-current="page">Current Match</span>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/mode-manager.js"></script>
    <script src="js/referee.js"></script>
</body>

</html>
